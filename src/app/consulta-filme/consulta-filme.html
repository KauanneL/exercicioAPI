<div class="container py-4">

  <h2 class="text-center mb-4">Consulta de Filmes</h2>

  <form
    [formGroup]="formFilmes"
    (ngSubmit)="obterFilmes(formFilmes.value.nome)">

    <div class="row justify-content-center mb-4">
      <div class="col-md-8">
        <div class="input-group">
          <input
            type="text"
            class="form-control"
            placeholder="Digite o nome do filme..."
            formControlName="nome">

          <button
            class="btn btn-primary"
            type="submit">
            Buscar
          </button>
        </div>

        @if (formFilmes.get('nome')?.touched &&
             formFilmes.get('nome')?.invalid) {
          <small class="text-danger">
            Informe o nome do filme.
          </small>
        }
      </div>
    </div>

  </form>

  <div class="row g-4">

    @for (film of filmes(); track film.imdbID) {

      <div class="col-12 col-sm-6 col-md-4 col-lg-3">

        <div class="card h-100 shadow-sm">

          <img
            [src]="film.Poster"
            [alt]="film.Title"
            class="card-img-top"
            style="height: 400px; object-fit: cover;">

          <div class="card-body">

            <h5 class="card-title">
              {{ film.Title }}
            </h5>

            <p class="card-text mb-1">
              <strong>Ano:</strong> {{ film.Year }}
            </p>

            <p class="card-text">
              <strong>Tipo:</strong> {{ film.Type }}
            </p>

          </div>

        </div>

      </div>

    }

  </div>

</div>
